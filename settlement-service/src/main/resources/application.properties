spring.application.name=settlement-service
server.port=8082

nibss.timeout-ms=5000
# Mock NIBSS behavior (dev/test only). 0.0 = always succeed, 1.0 = always fail.
nibss.mock.fail-rate=0.2

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/PaymentService?sslmode=disable&preferQueryMode=simple
spring.datasource.username=postgres
spring.datasource.password=Bolu@123wat$ife
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

#debug= true

# Distributed Tracing
management.tracing.sampling.probability=1.0
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] --- [%15.15t] %-40.40logger{39} : %m%n%wEx