spring.application.name=ledger-service
server.port=8081

# Datasource
spring.datasource.url=jdbc:postgresql://localhost:5433/LedgerService?sslmode=disable&preferQueryMode=simple
spring.datasource.username=postgres
spring.datasource.password=Bolu@123wat_ife
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=5000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# Distributed Tracing
management.tracing.sampling.probability=1.0
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [app=${spring.application.name:}, traceId=%X{traceId:-}, spanId=%X{spanId:-}] --- [%15.15t] %-40.40logger{39} : %m%n%wEx

# OTLP Exporter for Jaeger
management.otlp.tracing.endpoint=http://jaeger:4318/v1/traces
management.tracing.export.otlp.enabled=true

# Flyway Configuration
spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
