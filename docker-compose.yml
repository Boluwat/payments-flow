version: "3.9"

services:
  # --- PostgreSQL Instances (one per service) ---
  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    env_file:
      - db.env
    environment:
      POSTGRES_DB: PaymentService
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - payment_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  postgres-ledger:
    image: postgres:16-alpine
    container_name: postgres-ledger
    env_file:
      - db.env
    environment:
      POSTGRES_DB: LedgerService
      POSTGRES_USER: postgres
    ports:
      - "5433:5432"
    volumes:
      - ledger_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  postgres-settlement:
    image: postgres:16-alpine
    container_name: postgres-settlement
    env_file:
      - db.env
    environment:
      POSTGRES_DB: SettlementService
      POSTGRES_USER: postgres
    ports:
      - "5434:5432"
    volumes:
      - settlement_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - payment-network

  # --- Core Services ---
  ledger-service:
    build:
      context: .
      dockerfile: ledger-service/Dockerfile
    container_name: ledger-service
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache wget && exec java -jar app.jar"]
    env_file:
      - db.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-ledger:5432/LedgerService?sslmode=disable&preferQueryMode=simple
      SPRING_DATASOURCE_USERNAME: postgres
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres-ledger:
        condition: service_healthy
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  settlement-service:
    build:
      context: .
      dockerfile: settlement-service/Dockerfile
    container_name: settlement-service
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache wget && exec java -jar app.jar"]
    env_file:
      - db.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-settlement:5432/SettlementService?sslmode=disable&preferQueryMode=simple
      SPRING_DATASOURCE_USERNAME: postgres
      SERVER_PORT: 8082
    ports:
      - "8082:8082"
    depends_on:
      postgres-settlement:
        condition: service_healthy
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    container_name: payment-service
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache wget && exec java -jar app.jar"]
    env_file:
      - db.env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/PaymentService?sslmode=disable&preferQueryMode=simple
      SPRING_DATASOURCE_USERNAME: postgres
      SERVER_PORT: 8080
      LEDGER-SERVICE_URL: http://ledger-service:8081
      SETTLEMENT-SERVICE_URL: http://settlement-service:8082
    ports:
      - "8080:8080"
    depends_on:
      postgres-payment:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Gateway ---
  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    entrypoint: ["/bin/sh", "-c"]
    command: ["apk add --no-cache wget && exec java -jar app.jar"]
    environment:
      SERVER_PORT: 8090
      PAYMENT_URI: http://payment-service:8080
      LEDGER_URI: http://ledger-service:8081
      SETTLEMENT_URI: http://settlement-service:8082
    ports:
      - "8090:8090"
    depends_on:
      payment-service:
        condition: service_healthy
      ledger-service:
        condition: service_healthy
      settlement-service:
        condition: service_healthy
    networks:
      - payment-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # --- Observability ---
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - payment-network
    depends_on:
      - gateway-service
      - payment-service
      - ledger-service
      - settlement-service

  grafana:
    image: grafana/grafana:10.4.1
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    networks:
      - payment-network
    depends_on:
      - prometheus

  jaeger:
    image: jaegertracing/all-in-one:1.50
    container_name: jaeger
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - payment-network

volumes:
  payment_db_data:
  ledger_db_data:
  settlement_db_data:
  grafana_data:

networks:
  payment-network:
    driver: bridge
