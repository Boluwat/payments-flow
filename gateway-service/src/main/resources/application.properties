spring.application.name=gateway-service
server.port=8090

# Resilience4j TimeLimiter — increase from default 1s to 30s
# so the payment saga (ledger + settlement + ledger) can finish
resilience4j.timelimiter.configs.default.timeoutDuration=30s
resilience4j.timelimiter.configs.default.cancelRunningFuture=true

# Netty HTTP client timeouts (should be >= timelimiter timeout)
spring.cloud.gateway.httpclient.connect-timeout=5000
spring.cloud.gateway.httpclient.response-timeout=30s

# =========================
# Gateway Routes - Payment
# =========================
spring.cloud.gateway.routes[0].id=payment-service
spring.cloud.gateway.routes[0].uri=http://localhost:8080
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/payments/**
spring.cloud.gateway.routes[0].filters[0]=CircuitBreaker=name=paymentServiceBreaker,fallbackUri=forward:/fallback/payment

# =========================
# Gateway Routes - Ledger
# =========================
spring.cloud.gateway.routes[1].id=ledger-service
spring.cloud.gateway.routes[1].uri=http://localhost:8081
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/ledger/**
spring.cloud.gateway.routes[1].filters[0]=CircuitBreaker=name=ledgerServiceBreaker,fallbackUri=forward:/fallback/ledger

# =========================
# Gateway Routes - Settlement
# =========================
spring.cloud.gateway.routes[2].id=settlement-service
spring.cloud.gateway.routes[2].uri=http://localhost:8082
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/settlements/**
spring.cloud.gateway.routes[2].filters[0]=CircuitBreaker=name=settlementServiceBreaker,fallbackUri=forward:/fallback/settlement

spring.main.web-application-type=reactive

# Reduce to INFO in production; leave DEBUG only while verifying routing
# debug=true

# Distributed Tracing
management.tracing.sampling.probability=1.0
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}] --- [%15.15t] %-40.40logger{39} : %m%n%wEx
